<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory Monitoring</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>Inventory Monitor</h2>

  <ul>
    <li><a href="#">Dashboard</a></li>
    <li><a href="#">Reports</a></li>
    <li><a href="#">Alarms</a></li>
    <li><a href="#">Settings</a></li>
  </ul>
</div>

<div class="main">

  <div class="header">
    <h1>Live Inventory Dashboard</h1>
  </div>

  <div class="cards">

    <div class="card">
      <h3>Tank Level</h3>
      <p id="level">0 %</p>
    </div>

    <div class="card">
      <h3>Temperature</h3>
      <p id="temp">0 °C</p>
    </div>

    <div class="card">
      <h3>Status</h3>
      <p id="status">Loading...</p>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
